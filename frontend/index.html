<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FunnelScan Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <div>
          <h1>FunnelScan</h1>
          <p class="subtitle">AI CRO Audit Agent</p>
        </div>
      </header>

      <section class="card form-card">
        <div class="field-grid">
          <label>
            Website URL
            <input id="url" type="url" placeholder="https://example.com" required />
          </label>
          <label>
            Persona
            <input id="persona" type="text" placeholder="E-commerce shopper" />
          </label>
          <label>
            Funnel Depth (pages)
            <input id="depth" type="number" min="1" max="8" value="3" />
          </label>
        </div>
        <div class="form-actions">
          <button id="analyzeBtn">Start Analysis</button>
        </div>
      </section>

      <!-- Live streaming logs — visible during and after analysis -->
      <section id="liveLogsPanel" class="card logs-live-card hidden">
        <div class="logs-live-header">
          <span class="logs-live-title">Agent Logs</span>
          <span id="logsSpinner" class="logs-spinner"></span>
        </div>
        <ul id="liveLogs" class="log-list"></ul>
      </section>

      <!-- Results — revealed after the SSE result event -->
      <section id="result" class="dashboard hidden">

        <!-- Full-width funnel visualization -->
        <article class="card funnel-viz-card">
          <div class="funnel-viz-header">
            <h2>Funnel Visualization</h2>
            <div class="funnel-stats-row">
              <span id="funnelDepthLabel" class="funnel-stat">—</span>
              <span id="conversionProb" class="funnel-stat funnel-stat-success">—</span>
              <span id="totalExitRate" class="funnel-stat funnel-stat-danger">—</span>
            </div>
          </div>
          <div id="funnelCanvas" class="funnel-canvas"></div>
        </article>

        <!-- Score card -->
        <article class="card score-card">
          <h2>FunnelScan Score</h2>
          <div class="gauge-wrap">
            <div class="gauge" id="scoreGauge" role="img" aria-label="Website score gauge">
              <div class="gauge-inner">
                <strong id="score">-</strong>
                <span>/100</span>
              </div>
            </div>
            <p id="scoreLabel" class="score-label">Awaiting report</p>
          </div>
          <p id="summary"></p>
          <button id="downloadJsonBtn" class="secondary-btn" disabled>Download API JSON</button>
        </article>

        <!-- Top conversion issues -->
        <article class="card issues-card">
          <h2>Top Conversion Issues</h2>
          <ul id="issues" class="issue-list"></ul>
        </article>

        <!-- AI improvements -->
        <article class="card improvements-card">
          <h2>AI Suggested Improvements</h2>
          <ul id="improvements" class="improvement-list"></ul>
        </article>

        <!-- Hero rewrite -->
        <article class="card rewrite-card">
          <h2>Hero Rewrite <span class="rewrite-subtitle">(First Page)</span></h2>
          <div class="rewrite">
            <p><strong>Headline</strong><span id="headline"></span></p>
            <p><strong>Subheadline</strong><span id="subheadline"></span></p>
            <p><strong>CTA</strong><span id="cta"></span></p>
          </div>
        </article>

      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
