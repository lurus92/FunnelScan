<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FunnelScan Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero card">
        <div>
          <p class="eyebrow">AI Website Audit Agent</p>
          <h1>FunnelScan</h1>
          <p class="subtitle">Analyze any page and get conversion insights in seconds.</p>
        </div>
      </section>

      <section class="card form-card">
        <label>
          Website URL
          <input id="url" type="url" placeholder="https://example.com" required />
        </label>

        <label>
          Persona
          <input id="persona" type="text" placeholder="E-commerce shopper" />
        </label>

        <button id="analyzeBtn">Start Analysis</button>
        <pre id="status" class="status">Idle</pre>
      </section>

      <section id="result" class="hidden results-grid">
        <article class="card score-card">
          <p class="eyebrow">FunnelScan Score</p>
          <div class="score-wrap">
            <strong id="score">-</strong>
            <span>/100</span>
          </div>
          <p id="summary"></p>
        </article>

        <article class="card">
          <h2>Top Issues</h2>
          <ul id="issues" class="styled-list"></ul>
        </article>

        <article class="card">
          <h2>Recommended Improvements</h2>
          <ul id="improvements" class="styled-list"></ul>
        </article>

        <article class="card">
          <h2>Hero Rewrite</h2>
          <div class="rewrite">
            <p><strong>Headline</strong><span id="headline"></span></p>
            <p><strong>Subheadline</strong><span id="subheadline"></span></p>
            <p><strong>CTA</strong><span id="cta"></span></p>
          </div>
        </article>

        <article class="card logs-card">
          <h2>Agent Logs</h2>
          <ul id="logs" class="styled-list"></ul>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
