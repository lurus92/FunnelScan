<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FunnelScan Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <div>
          <h1>FunnelScan</h1>
          <p class="subtitle">AI CRO Audit Agent</p>
        </div>
      </header>

      <section class="card form-card">
        <div class="field-grid">
          <label>
            Website URL
            <input id="url" type="url" placeholder="https://example.com" required />
          </label>

          <label>
            Persona
            <input id="persona" type="text" placeholder="E-commerce shopper" />
          </label>

          <label>
            Funnel Depth (pages)
            <input id="depth" type="number" min="1" max="8" value="3" />
          </label>
        </div>

        <div class="form-actions">
          <button id="analyzeBtn">Start Analysis</button>
          <pre id="status" class="status">Idle</pre>
        </div>
      </section>

      <section id="result" class="dashboard hidden">
        <article class="card score-card">
          <h2>FunnelScan Score</h2>
          <div class="gauge-wrap">
            <div class="gauge" id="scoreGauge" role="img" aria-label="Website score gauge">
              <div class="gauge-inner">
                <strong id="score">-</strong>
                <span>/100</span>
              </div>
            </div>
            <p id="scoreLabel" class="score-label">Awaiting report</p>
          </div>
          <p id="summary"></p>
        </article>

        <article class="card issues-card deferred-card hidden">
          <h2>Top Conversion Issues</h2>
          <ul id="issues" class="issue-list"></ul>
        </article>

        <article class="card improvements-card deferred-card hidden">
          <h2>AI Suggested Improvements</h2>
          <ul id="improvements" class="improvement-list"></ul>
        </article>

        <article class="card funnel-card deferred-card hidden">
          <h2>Funnel Visualization</h2>
          <p id="conversionProb" class="conversion-probability">Final conversion probability: —</p>
          <ul id="funnelSteps" class="funnel-list"></ul>
        </article>

        <article class="card rewrite-card deferred-card hidden">
          <h2>Hero Rewrite</h2>
          <div class="rewrite">
            <p><strong>Headline</strong><span id="headline"></span></p>
            <p><strong>Subheadline</strong><span id="subheadline"></span></p>
            <p><strong>CTA</strong><span id="cta"></span></p>
          </div>
        </article>

        <details class="card logs-card deferred-card hidden" open>
          <summary>Agent Logs</summary>
          <ul id="logs" class="log-list"></ul>
        </details>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
